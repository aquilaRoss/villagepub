name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  setup-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

#      - name: Install MinGW and CMake (optional, already installed on GitHub runners)
#        shell: powershell
#        run: |
#            Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
#            irm get.scoop.sh | iex
#            scoop install mingw cmake

      - name: Set short SHA
        id: vars
        shell: pwsh
        run: |
          $short = $env:GITHUB_SHA.Substring(0,7)
          echo "SHORT_SHA=$short" >> $env:GITHUB_OUTPUT

      - name: Clone Raylib
        run: |
          git clone --branch 5.5 --depth 1 https://github.com/raysan5/raylib.git raylib
        shell: bash

      - name: Clone Googletest
        run: |
          git clone --branch v1.17.0 --depth 1 https://github.com/google/googletest.git tests/googletest
        shell: bash

      - name: Build Project
        run: |
          mkdir -p build
          cd build
          cmake -G "MinGW Makefiles" -DBUILD_TESTS=ON ..
          cmake --build .
        shell: bash

      - name: Install Mesa3D (software OpenGL for CI)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/pal1000/mesa-dist-win/releases/download/24.3.4/mesa3d-24.3.4-release-mingw.7z" -OutFile "mesa3d.7z"
          7z x mesa3d.7z -o"mesa3d" | Out-Null
          Copy-Item "mesa3d\x64\opengl32.dll" "build\"
          Copy-Item "mesa3d\x64\libgallium_wgl.dll" "build\"

      - name: Smoke test MyGame
        run: timeout 5 ./build/MyGame.exe || [ $? -eq 124 ]
        shell: bash

      - name: Run Unit Tests
        run: |
          mkdir -p build/test-results
          ./build/tests/RNGTests.exe --gtest_output=xml:build/test-results/RNGTests.xml
        shell: bash

      - name: Upload Test Report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: RNGTests - Windows
          path: build/test-results/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload built game
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-windows-${{ steps.vars.outputs.SHORT_SHA }}
          path: build/MyGame.exe
